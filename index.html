        window.toggleLeaderboard = async () => {
            if (!isAdmin) return;
            const newState = !leaderboardPublic;
            message = newState ? 'Making leaderboard public...' : 'Hiding leaderboard...'; render();
            try {
                const settingsRef = doc(db, ...getPublicDataPathSegments(), SETTINGS_COLLECTION_NAME, SETTINGS_DOC_ID);
                await setDoc(settingsRef, { leaderboardPublic: newState, updated: serverTimestamp() }, { merge: true });
                message = newState ? 'Leaderboard is now PUBLIC!' : 'Leaderboard is now HIDDEN from voters.';
            } catch (error) {
                message = `Failed to toggle leaderboard: ${error.message}`;
                console.error("Toggle leaderboard error:", error);
            } finally { render(); }

        // --- CSV IMPORT ---
        let pendingImportBeers = [];

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];

            // Detect delimiter
            const header = lines[0];
            const delimiter = header.includes('\t') ? '\t' : ',';
            
            const headers = header.split(delimiter).map(h => h.trim().toLowerCase().replace(/['"]/g, ''));
            
            // Map column names flexibly
            const nameIdx = headers.findIndex(h => h === 'name' || h === 'beer' || h === 'beer name' || h === 'beer_name');
            const brewerIdx = headers.findIndex(h => h === 'brewer' || h === 'brewery');
            const styleIdx = headers.findIndex(h => h === 'style' || h === 'type');
            const abvIdx = headers.findIndex(h => h === 'abv' || h === 'abv %' || h === 'abv%' || h === 'alcohol');
            const imageIdx = headers.findIndex(h => h === 'image' || h === 'imageurl' || h === 'image_url' || h === 'image url' || h === 'img');
            const descIdx = headers.findIndex(h => h === 'description' || h === 'desc' || h === 'notes' || h === 'tasting notes');
            const groupIdx = headers.findIndex(h => h === 'group' || h === 'category' || h === 'colour' || h === 'color');
            const barIdx = headers.findIndex(h => h === 'bar' || h === 'location');
            const allergensIdx = headers.findIndex(h => h === 'allergens' || h === 'allergen');
            const veganIdx = headers.findIndex(h => h === 'vegan' || h === 'vg');
            const statusIdx = headers.findIndex(h => h === 'status' || h === 'reserve');
            const tapNumberIdx = headers.findIndex(h => h === 'tap' || h === 'tap_number' || h === 'tapnumber' || h === 'tap number' || h === 'tap#');

            if (nameIdx === -1) return [];

            // Recognised group values, normalised to canonical capitalisation
            const groupNorm = (s) => {
                const v = (s || '').trim().toLowerCase();
                if (v === 'golden') return 'Golden';
                if (v === 'amber') return 'Amber';
                if (v === 'dark') return 'Dark';
                if (v === 'special') return 'Special';
                return s ? s.trim() : '';
            };

            const veganNorm = (s) => {
                const v = (s || '').trim().toLowerCase();
                return v === 'yes' || v === 'y' || v === 'true' || v === '1' || v === 'vegan';
            };

            // Normalise status: 'reserve'/'r'/'yes'(if status column = reserve marker) => 'reserve', otherwise active
            const statusNorm = (s) => {
                const v = (s || '').trim().toLowerCase();
                if (v === 'reserve' || v === 'r' || v === 'yes' || v === 'true' || v === '1') return 'reserve';
                if (v === 'retired') return 'retired';
                return 'active';
            };

            const results = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(delimiter).map(c => c.trim().replace(/^['"]|['"]$/g, ''));
                const name = cols[nameIdx] || '';
                if (!name) continue;
                results.push({
                    name: name,
                    brewer: brewerIdx !== -1 ? (cols[brewerIdx] || '') : '',
                    style: styleIdx !== -1 ? (cols[styleIdx] || '') : '',
                    abv: abvIdx !== -1 ? (parseFloat(cols[abvIdx]) || 0) : 0,
                    description: descIdx !== -1 ? (cols[descIdx] || '') : '',
                    imageUrl: imageIdx !== -1 ? (cols[imageIdx] || '') : '',
                    group: groupIdx !== -1 ? groupNorm(cols[groupIdx]) : '',
                    bar: barIdx !== -1 ? (cols[barIdx] || '').trim() : '',
                    allergens: allergensIdx !== -1 ? (cols[allergensIdx] || '') : '',
                    vegan: veganIdx !== -1 ? veganNorm(cols[veganIdx]) : false,
                    status: statusIdx !== -1 ? statusNorm(cols[statusIdx]) : 'active',
                    tapNumber: tapNumberIdx !== -1 ? (parseInt(cols[tapNumberIdx]) || null) : null
                });
            }
            return results;
        }

        window.handleCSVFile = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                pendingImportBeers = parseCSV(e.target.result);
                const preview = document.getElementById('csvPreview');
                const importBtn = document.getElementById('csvImportBtn');
                if (pendingImportBeers.length === 0) {
                    preview.innerHTML = '<p class="text-sm text-red-600 font-semibold">Could not parse any beers. Make sure the CSV has a "name" column.</p>';
                    importBtn.classList.add('hidden');
                } else {
                    let previewHtml = `<p class="text-sm font-semibold text-green-700 mb-2">Found ${pendingImportBeers.length} beers to import:</p>`;
                    previewHtml += '<div class="max-h-40 overflow-y-auto bg-gray-50 rounded border p-2 text-xs space-y-1">';
                    pendingImportBeers.forEach((b, i) => {
                        previewHtml += `<div class="flex justify-between"><span class="font-semibold">${sanitize(b.name)}</span><span class="text-gray-500">${sanitize(b.brewer)} · ${sanitize(b.style)} · ${b.abv}%</span></div>`;
                    });
                    previewHtml += '</div>';
                    preview.innerHTML = previewHtml;
                    importBtn.classList.remove('hidden');
                }
            };
            reader.readAsText(file);
        };

        window.handleImportBeers = async () => {
            if (!isAdmin || pendingImportBeers.length === 0) return;
            message = `Importing ${pendingImportBeers.length} beers...`; render();
            try {
                const BATCH_LIMIT = 499;
                const startOrder = beers.length * 10;
                for (let i = 0; i < pendingImportBeers.length; i += BATCH_LIMIT) {
                    const batch = writeBatch(db);
                    const chunk = pendingImportBeers.slice(i, i + BATCH_LIMIT);
                    chunk.forEach((beer, idx) => {
                        const ref = doc(collection(db, ...getPublicDataPathSegments(), BEERS_COLLECTION_NAME));
                        // Auto-assign tap number for this beer. The "claimed" set is keyed
                        // by bar so each bar gets its own independent 1, 2, 3 sequence.
                        if (!window._claimedTapNumbers) {
                            // Build initial map: bar name -> Set of already-used tap numbers
                            window._claimedTapNumbers = new Map();
                            beers.forEach(b => {
                                if (typeof b.tapNumber === 'number') {
                                    const key = b.bar || '';
                                    if (!window._claimedTapNumbers.has(key)) {
                                        window._claimedTapNumbers.set(key, new Set());
                                    }
                                    window._claimedTapNumbers.get(key).add(b.tapNumber);
                                }
                            });
                        }
                        const barKey = beer.bar || '';
                        if (!window._claimedTapNumbers.has(barKey)) {
                            window._claimedTapNumbers.set(barKey, new Set());
                        }
                        const claimedForBar = window._claimedTapNumbers.get(barKey);
                        let tap = beer.tapNumber || 1;
                        while (claimedForBar.has(tap)) tap++;
                        claimedForBar.add(tap);
                        batch.set(ref, {
                            name: beer.name,
                            brewer: beer.brewer,
                            style: beer.style,
                            abv: beer.abv,
                            description: beer.description || '',
                            imageUrl: beer.imageUrl || '',
                            group: beer.group || '',
                            bar: beer.bar || '',
                            allergens: beer.allergens || '',

        window.initActivateReserve = (reserveId) => {
            if (!isAdmin) return;
            const reserve = getBeerById(reserveId);
            if (!reserve) return;
            // Reserves can replace any active beer at the SAME bar (since the reserve cask
            // is physically located at one bar). In single-bar mode (no bars configured),
            // bar filtering is skipped.
            const sameBarOnly = bars.length > 0;
            const candidates = beers.filter(b => 
                b.id !== reserveId 
                && (b.status || 'active') === 'active'
                && (!sameBarOnly || (b.bar || '') === (reserve.bar || ''))
            ).sort((a, b) => {
                // Sold-out beers first (most likely replacement targets)
                if (a.soldOut && !b.soldOut) return -1;
                if (!a.soldOut && b.soldOut) return 1;
                // Then by tap order — same sort getSortedBeers uses, so #1, #2, #3 etc.
                const ga = getGroupByName(a.group);
                const gb = getGroupByName(b.group);
                const groupOrderA = ga ? (ga.order !== undefined ? ga.order : 9999) : 99999;
                const groupOrderB = gb ? (gb.order !== undefined ? gb.order : 9999) : 99999;
                if (groupOrderA !== groupOrderB) return groupOrderA - groupOrderB;
                return (a.order || 0) - (b.order || 0);
            });
            const barLabel = sameBarOnly && reserve.bar ? ` at ${reserve.bar}` : '';
            pendingAdminAction = {

        window.confirmAdminAction = async (actionType) => {
            if (!isAdmin || !pendingAdminAction) return;
            const { data } = pendingAdminAction;
            
            // IMPORTANT: read any modal form inputs BEFORE clearing pendingAdminAction.
            // Once we null it out and re-render, the modal DOM is gone and querySelector
            // returns null. For activateReserve we need the dropdown selection to survive.
            let capturedReplaceId = null;
            if (actionType === 'activateReserve') {
                const replaceSelect = document.querySelector('#replaceBeerSelect');
                if (replaceSelect) capturedReplaceId = replaceSelect.value;
            }
            
            pendingAdminAction = null;
            message = `Executing ${actionType}...`; render();

            try {
                if (actionType === 'deleteAllVotes') {
                    const votesSnapshot = await getDocs(query(collection(db, ...getPublicDataPathSegments(), VOTES_COLLECTION_NAME)));
                    const batch = writeBatch(db);
                    votesSnapshot.docs.forEach((doc) => batch.delete(doc.ref));
                    await batch.commit();
                    message = `Successfully deleted all ${votesSnapshot.size} votes!`;
                } else if (actionType === 'deleteBeer') {
                    const beerId = data.beerId;
                    const beerName = getBeerById(beerId)?.name || 'Beer';
                    const beerRef = doc(db, ...getPublicDataPathSegments(), BEERS_COLLECTION_NAME, beerId);
                    
                    const votesToDelete = votes.filter(v => v.beerId === beerId);
                    const voteBatch = writeBatch(db);
                    votesToDelete.forEach(v => {
                        voteBatch.delete(doc(db, ...getPublicDataPathSegments(), VOTES_COLLECTION_NAME, v.id));
                    });
                    await voteBatch.commit();
                    await deleteDoc(beerRef);
                    message = `Successfully deleted beer **${beerName}** and its ${votesToDelete.length} votes.`;
                } else if (actionType === 'deleteGroup') {
                    const groupId = data.groupId;
                    const groupName = groups.find(g => g.id === groupId)?.name || 'Group';
                    await deleteDoc(doc(db, ...getPublicDataPathSegments(), GROUPS_COLLECTION_NAME, groupId));
                    message = `Group **${groupName}** deleted. Any beers previously in this group keep the label but are no longer grouped on the tap list.`;
                } else if (actionType === 'deleteBar') {
                    const barId = data.barId;
                    const barName = bars.find(b => b.id === barId)?.name || 'Bar';
                    await deleteDoc(doc(db, ...getPublicDataPathSegments(), BARS_COLLECTION_NAME, barId));
                    message = `Bar **${barName}** deleted. Any beers previously at this bar keep the label but are no longer grouped on the tap list.`;
                } else if (actionType === 'activateReserve') {
                    const reserveId = data.reserveId;
                    const reserve = getBeerById(reserveId);
                    if (!reserve) throw new Error('Reserve beer not found');
                    
                    // Use the dropdown value we captured before the modal was dismissed.
                    const replaced = capturedReplaceId ? getBeerById(capturedReplaceId) : null;
                    
                    const batch = writeBatch(db);
                    const reserveRef = doc(db, ...getPublicDataPathSegments(), BEERS_COLLECTION_NAME, reserveId);
                    
                    if (replaced) {
                        // Reserve keeps its OWN group (a Special stays a Special).
                        // It inherits the replaced beer's tapNumber — the number is a
                        // property of the tap, so it transfers to whatever's poured next.
                        // The replaced beer is retired (hidden but not deleted, votes preserved)
                        // and its tapNumber is cleared so it's not double-used.
                        const replacedRef = doc(db, ...getPublicDataPathSegments(), BEERS_COLLECTION_NAME, replaced.id);
                        batch.update(reserveRef, {
                            status: 'active',
                            tapNumber: replaced.tapNumber || getNextAvailableTapNumber(reserve.bar || ''),
                            activatedAt: serverTimestamp()
                        });
                        batch.update(replacedRef, {
                            status: 'retired',
                            tapNumber: null  // free up the number
                        });
                    } else {
                        // No replacement — activate with a fresh tap number scoped to its bar
                        batch.update(reserveRef, {
                            status: 'active',
                            tapNumber: reserve.tapNumber || getNextAvailableTapNumber(reserve.bar || ''),
                            activatedAt: serverTimestamp()
                        });
                    }
                    
                    await batch.commit();
                    message = replaced
                        ? `**${reserve.name}** is now on tap, replacing **${replaced.name}**.`
                        : `**${reserve.name}** is now on tap.`;
                }
            } catch (error) {
                message = `Admin action failed: ${error.message}`;
                console.error("Admin Action Error: ", error);
            } finally { render(); }
        };

            const editBarForm = $('#editBarForm');
            if (editBarForm) editBarForm.addEventListener('submit', handleEditBar);

            // CSV file input listener
            const csvInput = $('#csvFileInput');
            if (csvInput) csvInput.addEventListener('change', function() { handleCSVFile(this); });
        }

        // Detect TV mode and bar filter from URL parameters
        // ?screen=tv → combined view (all bars)
        // ?screen=tv&bar=Inside Bar → only show that bar
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('screen') === 'tv') {
            currentScreen = 'tv';
        }
        const getTvBarFilter = () => {
            const param = new URLSearchParams(window.location.search).get('bar');
            return param ? param.trim() : null;
        };

        window.addEventListener('DOMContentLoaded', authenticateUser);
        window.changeScreen = changeScreen;
        window.cancelAction = cancelAction;
        window.handleVote = handleVote;
        window.confirmVote = confirmVote;
        window.initAdminAction = initAdminAction;
        window.confirmAdminAction = confirmAdminAction;
        window.handleReorder = handleReorder;
        window.handleDeleteBeer = handleDeleteBeer;
        window.initEditBeer = initEditBeer;
        window.copyToClipboard = (text) => { navigator.clipboard.writeText(text).then(() => { alert('Copied to clipboard!'); }); };
        window.toggleDesc = (id) => { const el = document.getElementById(id); if (el) el.classList.toggle('hidden'); };
    </script>
</body>
</html>

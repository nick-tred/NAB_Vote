<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAB Beer Festival Voting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Warm Bronze/Beer-like background */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }
        body { 
            font-family: 'Raleway', sans-serif; 
            background-color: #C2A858; 
        }
        #app {
            width: 100%;
            max-width: 100vw;
        }
        .admin-list::-webkit-scrollbar { width: 8px; }
        .admin-list::-webkit-scrollbar-thumb { background-color: #fca5a5; border-radius: 4px; }
        .admin-list::-webkit-scrollbar-track { background-color: #fff; }
        /* Mobile flex-item shrinkability.
           Default browser min-width on flex/grid items is "min-content", which prevents
           items shrinking smaller than their longest unbreakable word — that's what was
           pushing the admin card past the viewport. This rule lets flex/grid items shrink
           below their content's intrinsic width on mobile. Targeted at the patterns that
           need it; doesn't force max-width on every element. */
        @media (max-width: 640px) {
            #app main .bg-white > * { min-width: 0; }
            #app main .bg-white .flex > * { min-width: 0; }
            #app main .bg-white .grid > * { min-width: 0; }
        }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen p-4 sm:p-8 text-gray-800">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signInWithEmailAndPassword,
            onAuthStateChanged,
            signOut,
            setPersistence,
            browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            doc, 
            query, 
            where,
            onSnapshot, 
            addDoc, 
            updateDoc,
            setDoc,
            serverTimestamp,
            setLogLevel,
            deleteDoc,
            writeBatch,
            getDocs
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =======================================================================
        // 🚨 CONFIGURATION 🚨
        // =======================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyA5_meKa9QPv9fih6oJYTsXsJipCSz9iWE",
          authDomain: "nab-vote.firebaseapp.com",
          projectId: "nab-vote",
          storageBucket: "nab-vote.firebasestorage.app",
          messagingSenderId: "114435310804",
          appId: "1:114435310804:web:c4af9cf52dd1208be0e741",
          measurementId: "G-DWNBN3DC34"
        };
        // =======================================================================

        const platformAppId = typeof __app_id !== 'undefined' ? __app_id : firebaseConfig.projectId;
        const appId = platformAppId || 'default-app-id';
        window.firebaseConfigError = !firebaseConfig.projectId || firebaseConfig.projectId.includes("YOUR_PROJECT_ID_HERE");

        let app, db, auth, analytics;
        if (!window.firebaseConfigError) {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            analytics = getAnalytics(app);
            setLogLevel('silent'); 
        } else {
            db = { collection: () => ({ path: 'CONFIG_ERROR_PATH' }), doc: () => ({ path: 'CONFIG_ERROR_PATH' }) };
            auth = { currentUser: null };
            console.error("Firebase initialization skipped due to missing or placeholder project ID.");
        }

        // State variables
        let userId = null;
        let isAnon = true;
        let isAdmin = false;
        let beers = [];
        let votes = [];        // Full votes collection — only populated when leaderboard/admin is active
        let myVotes = [];      // Current user's votes only — always populated
        let votesLoadedAt = null; // Timestamp of last full-votes fetch (for "last updated" UI)
        let groups = [];       // Beer groupings (Golden/Amber/Dark/Special etc.) — admin-managed
        let editingGroupId = null; // State for tracking which group is being edited
        let bars = [];         // Bars (Inside Bar / Outside Bar etc.) — admin-managed
        let editingBarId = null; // State for tracking which bar is being edited
        let currentScreen = 'voting';
        let message = '';
        let pendingVote = null;
        let pendingAdminAction = null;
        let editingBeerId = null; // State for tracking which beer is being edited
        let expandedBeerId = null; // State for tracking which beer detail modal is open
        let votingOpen = true; // Whether voting is currently open
        let leaderboardPublic = false; // Whether leaderboard is visible to non-admins

        // Firestore Path Constants
        const BEERS_COLLECTION_NAME = 'beers';
        const VOTES_COLLECTION_NAME = 'votes';
        const GROUPS_COLLECTION_NAME = 'groups';
        const BARS_COLLECTION_NAME = 'bars';
        const ADMINS_COLLECTION_NAME = 'admins';
        const SETTINGS_COLLECTION_NAME = 'settings';
        const SETTINGS_DOC_ID = 'config';

        const getPublicDataPathSegments = () => ['artifacts', appId, 'public', 'data'];
        
        const $ = selector => document.querySelector(selector);

        // Security: HTML Sanitizer
        const sanitize = (text) => {
            if (text === null || text === undefined) return '';
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        };

        // Image compression — resize to small thumbnail and return base64 data URL
        function compressImageToBase64(file, maxWidth = 800, quality = 0.75) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        // Firestore has a 1 MB hard limit per document. An 800px JPEG at q=0.75
                        // typically lands at 60–120 KB which is comfortably inside the limit, but
                        // warn if a particular image is unusually heavy (e.g. very busy photo).
                        const sizeKB = Math.round((dataUrl.length * 3) / 4 / 1024);
                        if (sizeKB > 500) {
                            console.warn(`Compressed image is ${sizeKB}KB — consider a smaller or simpler source image.`);
                        }
                        resolve(dataUrl);
                    };
                    img.onerror = () => reject(new Error('Invalid image file'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        const getBeerById = (id) => beers.find(b => b.id === id);

        const getSortedGroups = () => {
            return [...groups].sort((a, b) => {
                const oa = a.order !== undefined ? a.order : 9999;
                const ob = b.order !== undefined ? b.order : 9999;
                return oa - ob || (a.name || '').localeCompare(b.name || '');
            });
        };

        const getGroupByName = (name) => {
            if (!name) return null;
            return groups.find(g => (g.name || '').toLowerCase() === name.toLowerCase()) || null;
        };

        const getSortedBars = () => {
            return [...bars].sort((a, b) => {
                const oa = a.order !== undefined ? a.order : 9999;
                const ob = b.order !== undefined ? b.order : 9999;
                return oa - ob || (a.name || '').localeCompare(b.name || '');
            });
        };

        const getBarByName = (name) => {
            if (!name) return null;
            return bars.find(b => (b.name || '').toLowerCase() === name.toLowerCase()) || null;
        };

        // Single-bar mode is active when no bars are configured. In that mode, the bar
        // column on beer forms is hidden, the TV never groups by bar, and the voting
        // screen has no bar outer-grouping. Lets a single-bar festival run with zero
        // bar-related UI clutter.
        const isMultiBar = () => bars.length > 1;

        // True if any beer in the system is assigned to a bar. We use this (not just
        // `bars.length > 0`) to decide whether to switch to the bar-aware layout —
        // because if bars are configured but no beers have been assigned yet, the
        // bar layout would just produce empty bar columns. Better to fall back to the
        // original layout until at least one beer is bar-assigned. Once any beer IS
        // assigned, the bar layout kicks in and unassigned beers are filtered out
        // entirely (no "Other" fallback) — admin can see un-bar'd beers in the admin list.
        const anyBeerHasBar = () => beers.some(b => b.bar && b.bar.trim());

        const getSortedBeers = () => {
            return [...beers].sort((a, b) => {
                // Sort by group order first (so all Goldens come before all Ambers, etc.)
                // Beers without a recognised group sort last.
                const ga = getGroupByName(a.group);
                const gb = getGroupByName(b.group);
                const groupOrderA = ga ? (ga.order !== undefined ? ga.order : 9999) : 99999;
                const groupOrderB = gb ? (gb.order !== undefined ? gb.order : 9999) : 99999;
                if (groupOrderA !== groupOrderB) return groupOrderA - groupOrderB;
                // Within the same group, fall back to the beer's own order field
                const orderA = a.order !== undefined ? a.order : 9999;
                const orderB = b.order !== undefined ? b.order : 9999;
                return orderA - orderB || a.name.localeCompare(b.name);
            });
        };

        // Active = visible on voting/TV. Reserves and retired beers are hidden from punters.
        const getActiveBeers = () => getSortedBeers().filter(b => (b.status || 'active') === 'active');

        // Find the lowest unused tap number — scoped to a bar if multi-bar is in use,
        // otherwise across all beers. Used for auto-assigning when admin adds a beer
        // without specifying a number. Per-bar scoping means each bar can have its own
        // "tap 1, 2, 3..." sequence.
        const getNextAvailableTapNumber = (barName = null) => {
            const scoped = barName !== null
                ? beers.filter(b => (b.bar || '') === barName)
                : beers;
            const used = new Set(scoped.map(b => b.tapNumber).filter(n => typeof n === 'number' && n > 0));
            let n = 1;
            while (used.has(n)) n++;
            return n;
        };

        // Returns the beer ID with the most recent activatedAt timestamp among active beers,
        // or null if none. Used to flag "NOW POURING" on the most-recently-activated reserve.
        const getNowPouringId = () => {
            let latestId = null;
            let latestMs = 0;
            getActiveBeers().forEach(b => {
                if (!b.activatedAt) return;
                const ms = b.activatedAt.toMillis ? b.activatedAt.toMillis() : (b.activatedAt.seconds ? b.activatedAt.seconds * 1000 : 0);
                if (ms > latestMs) { latestMs = ms; latestId = b.id; }
            });
            return latestId;
        };

        function renderConfigError() {
            return `
                <div class="max-w-xl mx-auto p-8 mt-12 bg-red-100 border-4 border-red-500 rounded-xl shadow-2xl text-red-800 space-y-4">
                    <h1 class="text-3xl font-extrabold flex items-center">Configuration Error</h1>
                    <p>Please check the Firebase Config section in the code.</p>
                </div>
            `;
        }

        function render() {
            const appDiv = $('#app');
            if (!appDiv) return;
            
            if (window.firebaseConfigError) {
                appDiv.innerHTML = renderConfigError();
                return;
            }

            // TV mode — completely separate layout
            if (currentScreen === 'tv') {
                appDiv.className = '';
                appDiv.innerHTML = renderTV();
                return;
            }

            // Restore normal classes for standard screens
            appDiv.className = 'min-h-screen p-3 sm:p-8 text-gray-800 flex flex-col justify-between';

            let contentHtml = '';

            // Header
            contentHtml += `
                <div>
                    <header class="max-w-4xl mx-auto text-center mb-6 sm:mb-8">
                        <img src="NAB_logo.png" alt="NAB Logo" class="mx-auto h-20 sm:h-[192px] mb-1 border-0"/>
                        <h1 class="text-2xl sm:text-5xl font-extrabold text-white flex flex-wrap items-center justify-center drop-shadow-lg px-2">
                            <i data-lucide="beer" class="w-5 h-5 sm:w-8 sm:h-8 mr-2 sm:mr-4 text-amber-100"></i>
                            <span>Beer Festival Voting</span>
                            <i data-lucide="beer" class="w-5 h-5 sm:w-8 sm:h-8 ml-2 sm:ml-4 text-amber-100"></i>
                        </h1>
                        <p class="text-sm sm:text-lg text-white mt-1 sm:mt-2 drop-shadow">Rate your favorite brews!</p>
                    </header>
                    
                    <nav class="mb-6 max-w-xs mx-auto p-1 bg-white rounded-full shadow-lg">
                        <ul class="flex justify-center space-x-1">
                            <li><button onclick="changeScreen('voting')" class="font-semibold py-2 px-6 rounded-full transition duration-150 ${currentScreen === 'voting' ? 'bg-slate-700 text-white shadow-md' : 'text-gray-700 hover:bg-gray-100'}">Vote</button></li>
                            ${leaderboardPublic || isAdmin ? `<li><button onclick="changeScreen('leaderboard')" class="font-semibold py-2 px-6 rounded-full transition duration-150 ${currentScreen === 'leaderboard' ? 'bg-slate-700 text-white shadow-md' : 'text-gray-700 hover:bg-gray-100'}">Leaderboard</button></li>` : ''}
                        </ul>
                    </nav>

                    ${message ? `<div class="max-w-4xl mx-auto mb-6 p-3 text-center bg-white border-l-4 border-amber-500 text-gray-800 rounded shadow-md font-semibold">${sanitize(message)}</div>` : ''}

                    ${currentScreen === 'admin' ? `
                    <div class="max-w-4xl mx-auto mb-6 p-2 text-center text-xs text-gray-700 bg-white/90 rounded-lg shadow-sm overflow-hidden border border-gray-200">
                        ID: <span class="font-mono font-semibold text-gray-800 break-all">${userId ? userId.substring(0,8)+'...' : 'Connecting...'}</span>
                        <span class="ml-2 px-2 py-0.5 rounded-full text-xs font-semibold ${isAnon ? 'bg-gray-500 text-white' : 'bg-green-600 text-white'}">
                            ${isAnon ? 'GUEST' : 'ADMIN'}
                        </span>
                    </div>` : ''}
                </div>
            `;
            
            contentHtml += `<main class="max-w-4xl mx-auto flex-grow">${renderContent()}</main>`;
            
            // Footer
            contentHtml += `
                <footer class="max-w-4xl mx-auto mt-12 mb-4 text-center">
                    <button onclick="changeScreen('admin')" class="text-xs py-2 px-4 rounded-full transition duration-150 border shadow-sm ${currentScreen === 'admin' ? 'bg-gray-800 text-white border-gray-900' : 'bg-white/80 text-gray-700 hover:bg-white border-gray-300'}">
                        ${currentScreen === 'admin' ? '🔒 Admin Mode Active' : '🔑 Admin Access'}
                    </button>
                </footer>
            `;

            // Modals
            if (expandedBeerId) {
                contentHtml += renderBeerDetailModal(expandedBeerId);
            }
            if (pendingVote) {
                contentHtml += renderVoteModal();
            } else if (pendingAdminAction) {
                contentHtml += renderAdminActionModal();
            } else if (editingBeerId) {
                contentHtml += renderEditBeerModal(editingBeerId);
            } else if (editingGroupId) {
                contentHtml += renderEditGroupModal(editingGroupId);
            } else if (editingBarId) {
                contentHtml += renderEditBarModal(editingBarId);
            }

            appDiv.innerHTML = contentHtml;

            if (window.lucide) window.lucide.createIcons();

            if (currentScreen === 'admin') attachAdminListeners();
        }

        // --- RENDER HELPERS ---

        function renderVoteModal() {
            return `
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center transform scale-100 max-h-[90vh] overflow-y-auto">
                        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-amber-100 mb-4 shadow-inner">
                            <i data-lucide="star" class="h-8 w-8 text-amber-500 fill-amber-500"></i>
                        </div>
                        <h3 class="text-2xl font-extrabold text-gray-900 mb-2">Confirm Vote</h3>
                        <div class="bg-gray-50 rounded-lg p-4 mb-6 border border-gray-100">
                            <p class="text-sm text-gray-500 mb-1">You are voting for:</p>
                            <p class="font-bold text-gray-800 text-lg leading-tight mb-3">${sanitize(pendingVote.beerName)}</p>
                            <div class="border-t border-gray-200 my-2"></div>
                            <p class="text-sm text-gray-500 mt-2">Score:</p>
                            <p class="font-black text-amber-600 text-4xl">${pendingVote.score}<span class="text-lg text-gray-400 font-normal">/10</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="cancelAction()" class="w-full py-3 px-4 border border-gray-300 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition duration-150">Cancel</button>
                            <button onclick="confirmVote()" class="w-full py-3 px-4 bg-amber-600 rounded-xl text-sm font-bold text-white hover:bg-amber-700 shadow-md transition duration-150">Submit</button>
                        </div>
                    </div>
                </div>`;
        }

        function renderAdminActionModal() {
            const { actionType, title, message: actionMessage, confirmText, icon, data } = pendingAdminAction;
            const isActivate = actionType === 'activateReserve';
            const iconBg = isActivate ? 'bg-blue-100' : 'bg-red-100';
            const iconColor = isActivate ? 'text-blue-500 fill-blue-500' : 'text-red-500 fill-red-500';
            const confirmBg = isActivate ? 'bg-blue-600 hover:bg-blue-700' : 'bg-red-600 hover:bg-red-700';
            
            let extraContent = '';
            if (isActivate && data?.candidates?.length > 0) {
                extraContent = `
                    <div class="text-left mb-6">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Replacing:</label>
                        <select id="replaceBeerSelect" class="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-sm font-medium focus:border-blue-500 focus:outline-none">
                            ${data.candidates.map(c => `
                                <option value="${c.id}"${c.soldOut ? ' selected' : ''}>
                                    ${c.tapNumber ? `#${c.tapNumber} — ` : ''}${sanitize(c.name)}${c.group ? ` (${sanitize(c.group)})` : ''}${c.soldOut ? ' — Sold Out' : ''}
                                </option>
                            `).join('')}
                        </select>
                        <p class="text-xs text-gray-400 mt-2 italic">The reserve takes over the selected beer's tap number. The replaced beer is hidden from the tap list. Existing votes stay intact.</p>
                    </div>`;
            }
            
            return `
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center transform scale-100 max-h-[90vh] overflow-y-auto">
                        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full ${iconBg} mb-4 shadow-inner">
                            <i data-lucide="${icon}" class="h-8 w-8 ${iconColor}"></i>
                        </div>
                        <h3 class="text-2xl font-extrabold text-gray-900 mb-2">${sanitize(title)}</h3>
                        <p class="text-base text-gray-600 mb-4">${sanitize(actionMessage)}</p>
                        ${extraContent}
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="cancelAction()" class="w-full py-3 px-4 border border-gray-300 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition duration-150">Cancel</button>
                            <button onclick="confirmAdminAction('${actionType}')" class="w-full py-3 px-4 ${confirmBg} rounded-xl text-sm font-bold text-white shadow-md transition duration-150">${sanitize(confirmText)}</button>
                        </div>
                    </div>
                </div>`;
        }

        function renderEditBeerModal(beerId) {
            const beer = getBeerById(beerId);
            if (!beer) return '';
            return `
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 sm:p-8 text-center transform scale-100 max-h-[90vh] overflow-y-auto">
                        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-blue-100 mb-4 shadow-inner">
                            <i data-lucide="pencil" class="h-8 w-8 text-blue-500 fill-blue-500"></i>
                        </div>
                        <h3 class="text-2xl font-extrabold text-gray-900 mb-2">Edit Beer Details</h3>
                        <p class="text-base text-gray-600 mb-6">Editing: <span class="font-bold">${sanitize(beer.name)}</span></p>

                        <form id="editBeerForm" data-beer-id="${beerId}" class="space-y-4">
                            <input type="text" name="name" placeholder="Beer Name" class="px-3 py-2 border rounded w-full" value="${sanitize(beer.name)}" required />
                            <input type="text" name="brewer" placeholder="Brewer" class="px-3 py-2 border rounded w-full" value="${sanitize(beer.brewer)}" required />
                            <input type="text" name="style" placeholder="Style" class="px-3 py-2 border rounded w-full" value="${sanitize(beer.style)}" required />
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                <div class="min-w-0">
                                    <label class="text-xs text-gray-500 block mb-1">Tap Number</label>
                                    <input type="number" name="tapNumber" placeholder="Tap #" min="1" class="px-3 py-2 border rounded w-full min-w-0" value="${beer.tapNumber !== undefined ? sanitize(beer.tapNumber) : ''}" />
                                </div>
                                <div class="min-w-0 sm:col-span-2">
                                    <label class="text-xs text-gray-500 block mb-1">ABV %</label>
                                    <input type="number" name="abv" placeholder="ABV %" step="0.1" class="px-3 py-2 border rounded w-full min-w-0" value="${sanitize(beer.abv)}" required />
                                </div>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                <select name="group" class="px-3 py-2 border rounded w-full min-w-0 bg-white">
                                    <option value=""${!beer.group ? ' selected' : ''}>Group (optional)</option>
                                    ${getSortedGroups().map(g => `<option value="${sanitize(g.name)}"${beer.group === g.name ? ' selected' : ''}>${sanitize(g.name)}</option>`).join('')}
                                    ${beer.group && !getGroupByName(beer.group) ? `<option value="${sanitize(beer.group)}" selected>${sanitize(beer.group)} (unknown group)</option>` : ''}
                                </select>
                                <input type="text" name="allergens" placeholder="Allergens (e.g. Gluten)" class="px-3 py-2 border rounded w-full min-w-0" value="${sanitize(beer.allergens || '')}" />
                            </div>
                            ${bars.length > 0 ? `
                            <select name="bar" class="px-3 py-2 border rounded w-full min-w-0 bg-white">
                                <option value=""${!beer.bar ? ' selected' : ''}>Bar (optional)</option>
                                ${getSortedBars().map(b => `<option value="${sanitize(b.name)}"${beer.bar === b.name ? ' selected' : ''}>${sanitize(b.name)}</option>`).join('')}
                                ${beer.bar && !getBarByName(beer.bar) ? `<option value="${sanitize(beer.bar)}" selected>${sanitize(beer.bar)} (unknown bar)</option>` : ''}
                            </select>
                            ` : ''}
                            <div class="flex items-center gap-4 flex-wrap">
                                <label class="flex items-center gap-2 text-sm text-gray-600 select-none">
                                    <input type="checkbox" name="vegan" class="w-4 h-4 rounded"${beer.vegan ? ' checked' : ''} />
                                    <span>Vegan-friendly</span>
                                </label>
                                <label class="flex items-center gap-2 text-sm text-gray-600 select-none">
                                    <span class="font-semibold">Status:</span>
                                    <select name="status" class="px-2 py-1 border rounded text-sm bg-white">
                                        <option value="active"${(!beer.status || beer.status === 'active') ? ' selected' : ''}>Active (visible)</option>
                                        <option value="reserve"${beer.status === 'reserve' ? ' selected' : ''}>Reserve (hidden)</option>

                                ${beer.imageUrl ? `<div class="mb-2 flex items-center gap-3"><img src="${sanitize(beer.imageUrl)}" class="w-12 h-12 object-contain rounded bg-gray-50" onerror="this.style.display='none'"/><span class="text-xs text-green-600 font-semibold">Current image</span><button type="button" onclick="clearBeerImage('${beerId}')" class="text-xs text-red-500 underline">Remove</button></div>` : ''}
                                <input type="file" name="imageFile" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100" />
                                <p class="text-xs text-gray-400 mt-1">Or paste a URL: <input type="url" name="imageUrl" placeholder="https://..." class="inline-block px-2 py-1 border rounded text-xs w-48 ml-1" value="${sanitize(beer.imageUrl || '')}" /></p>
                            </div>
                            <div>
                                <label class="text-xs text-gray-500 mb-1 block">Admin List Sort Order <span class="text-gray-400">(only affects the admin list, not the tap list)</span></label>
                                <input type="number" name="order" placeholder="Order" class="px-3 py-2 border rounded w-full" value="${beer.order !== undefined ? beer.order : ''}" />
                            </div>

                            <div class="grid grid-cols-2 gap-3 mt-6">
                                <button type="button" onclick="cancelAction()" class="w-full py-3 px-4 border border-gray-300 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition duration-150">Cancel</button>
                                <button type="submit" class="w-full py-3 px-4 bg-blue-600 rounded-xl text-sm font-bold text-white hover:bg-blue-700 shadow-md transition duration-150">Save Changes</button>
                            </div>
                        </form>
                    </div>
                </div>`;
        }

        function renderEditGroupModal(groupId) {
            const g = groups.find(x => x.id === groupId);
            if (!g) return '';
            const beersInGroup = beers.filter(b => b.group === g.name).length;
            return `
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform scale-100 max-h-[90vh] overflow-y-auto">
                        <h3 class="text-xl font-extrabold text-gray-900 mb-1">Edit Group</h3>
                        <p class="text-sm text-gray-500 mb-4">${beersInGroup} beer${beersInGroup === 1 ? '' : 's'} in this group. Renaming will update them all.</p>
                        <form id="editGroupForm" data-group-id="${groupId}" class="space-y-3">
                            <input type="text" name="name" placeholder="Group name" class="px-3 py-2 border rounded w-full" value="${sanitize(g.name)}" required maxlength="40" />
                            <label class="flex items-center gap-3 text-sm text-gray-600">
                                <span class="flex-shrink-0">Colour:</span>
                                <input type="color" name="color" value="${sanitize(g.color || '#C2A858')}" class="w-12 h-10 border rounded cursor-pointer" />
                                <span class="text-xs text-gray-400">Used as accent on the tap list</span>
                            </label>
                            <div class="grid grid-cols-2 gap-3 mt-4">
                                <button type="button" onclick="cancelAction()" class="w-full py-2.5 px-4 border border-gray-300 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition">Cancel</button>
                                <button type="submit" class="w-full py-2.5 px-4 bg-blue-600 rounded-xl text-sm font-bold text-white hover:bg-blue-700 shadow-md transition">Save</button>
                            </div>
                        </form>
                    </div>
                </div>`;
        }

        function renderEditBarModal(barId) {
            const b = bars.find(x => x.id === barId);
            if (!b) return '';
            const beersInBar = beers.filter(beer => beer.bar === b.name).length;
            return `
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform scale-100 max-h-[90vh] overflow-y-auto">
                        <h3 class="text-xl font-extrabold text-gray-900 mb-1">Edit Bar</h3>
                        <p class="text-sm text-gray-500 mb-4">${beersInBar} beer${beersInBar === 1 ? '' : 's'} assigned. Renaming will update them all.</p>
                        <form id="editBarForm" data-bar-id="${barId}" class="space-y-3">
                            <input type="text" name="name" placeholder="Bar name" class="px-3 py-2 border rounded w-full" value="${sanitize(b.name)}" required maxlength="40" />
                            <div class="grid grid-cols-2 gap-3 mt-4">
                                <button type="button" onclick="cancelAction()" class="w-full py-2.5 px-4 border border-gray-300 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 transition">Cancel</button>
                                <button type="submit" class="w-full py-2.5 px-4 bg-blue-600 rounded-xl text-sm font-bold text-white hover:bg-blue-700 shadow-md transition">Save</button>
                            </div>
                        </form>
                    </div>
                </div>`;
        }

        function renderBeerDetailModal(beerId) {
            const beer = getBeerById(beerId);
            if (!beer) return '';
            const userVotesMap = getUserVotesMap();
            const hasVoted = !!userVotesMap[beer.id];
            const yourScore = userVotesMap[beer.id];
            const hasImage = beer.imageUrl && beer.imageUrl.trim();
            const hasDesc = beer.description && beer.description.trim();
            const beerNum = beer.tapNumber || '?';

            return `
                <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-40 p-2 sm:p-4 animate-in fade-in duration-200" onclick="closeBeerDetail()">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[95vh] sm:max-h-[90vh] overflow-y-auto transform scale-100" onclick="event.stopPropagation()">
                        <div class="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-gray-100 px-3 sm:px-4 py-2 sm:py-3 flex items-center justify-between z-10">
                            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-700 text-white font-black text-sm shadow-md">${beerNum}</span>
                            <button onclick="closeBeerDetail()" class="p-2 rounded-full hover:bg-gray-100 transition" aria-label="Close">
                                <i data-lucide="x" class="w-5 h-5 text-gray-600"></i>
                            </button>
                        </div>
                        <div class="relative w-full bg-gray-50 flex items-center justify-center">
                            ${hasImage
                                ? `<img src="${sanitize(beer.imageUrl)}" alt="${sanitize(beer.name)}" class="w-full h-64 sm:h-80 object-contain p-4" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="hidden w-full h-64 sm:h-80 items-center justify-center text-6xl sm:text-7xl">🍺</div>`
                                : `<div class="w-full h-44 sm:h-56 flex items-center justify-center text-6xl sm:text-7xl">🍺</div>`
                            }
                        </div>
                        <div class="p-4 sm:p-5 space-y-4">
                            <div class="space-y-1">
                                <div class="flex items-start gap-3">
                                    <h2 class="flex-grow min-w-0 text-xl sm:text-2xl font-extrabold text-gray-800 leading-tight break-words">${sanitize(beer.name)}</h2>
                                    <div class="flex-shrink-0 text-right leading-none">
                                        <p class="text-2xl sm:text-3xl font-black text-gray-800">${sanitize(beer.abv)}<span class="text-base sm:text-lg">%</span></p>
                                        <p class="text-[10px] text-gray-400 uppercase tracking-wide font-semibold mt-0.5">ABV</p>
                                    </div>
                                </div>
                                <div class="flex items-baseline gap-3">
                                    <p class="flex-grow min-w-0 text-sm text-gray-500 italic">${sanitize(beer.brewer)}</p>
                                    <p class="flex-shrink-0 text-xs uppercase tracking-wide font-semibold text-gray-500 text-right">${sanitize(beer.style)}</p>
                                </div>
                            </div>
                            ${(beer.vegan || (beer.allergens && beer.allergens.trim())) ? `
                                <div class="flex flex-wrap items-center gap-2 -mt-1">
                                    ${beer.vegan ? `
                                        <span class="inline-flex items-center gap-1 text-xs font-bold text-green-800 bg-green-100 px-2 py-1 rounded-full">
                                            <i data-lucide="leaf" class="w-3 h-3"></i>
                                            Vegan
                                        </span>
                                    ` : ''}
                                    ${(beer.allergens && beer.allergens.trim()) ? `
                                        <span class="inline-flex items-center gap-1 text-xs font-bold text-amber-800 bg-amber-100 px-2 py-1 rounded-full">
                                            <i data-lucide="alert-triangle" class="w-3 h-3"></i>
                                            Contains: ${sanitize(beer.allergens)}
                                        </span>
                                    ` : ''}
                                </div>
                            ` : ''}
                            ${hasDesc ? `
                                <div class="bg-amber-50 border border-amber-100 rounded-lg p-3">
                                    <p class="text-xs text-amber-800 font-semibold uppercase tracking-wide mb-1">Tasting Notes</p>
                                    <p class="text-sm text-gray-700 leading-relaxed">${sanitize(beer.description)}</p>
                                </div>
                            ` : ''}
                            ${beer.soldOut ? `
                                <div class="flex items-center justify-center gap-2">
                                    <span class="inline-flex items-center gap-1.5 text-xs font-bold text-red-700 bg-red-100 px-3 py-1 rounded-full uppercase tracking-wide">
                                        <i data-lucide="ban" class="w-3.5 h-3.5"></i>
                                        Sold Out
                                    </span>
                                    <span class="text-xs text-gray-500 italic">No longer at the bar</span>
                                </div>
                            ` : ''}
                            ${votingOpen ? `
                                <div class="pt-2">
                                    <p class="text-center text-xs text-gray-500 uppercase tracking-wide font-semibold mb-2">
                                        ${hasVoted ? `You rated this ${yourScore}/10` : (beer.soldOut ? 'Already had a taste? Rate it anyway' : 'Tap a star to vote')}
                                    </p>
                                    <div class="bg-amber-500/10 rounded-lg py-3 px-2">
                                        ${renderStarRating(yourScore || 0, 10, hasVoted, yourScore, beer.id)}
                                    </div>
                                </div>
                            ` : `
                                <div class="pt-2 text-center text-sm text-gray-500 italic">Voting is closed</div>
                            `}
                        </div>
                    </div>
                </div>`;
        }

        function changeScreen(screen) {
            currentScreen = screen;
            message = '';
            pendingVote = null;
            pendingAdminAction = null;
            editingBeerId = null;
            editingGroupId = null;
            editingBarId = null;
            expandedBeerId = null;
            ensureFullVotesListener();
            render();
        }

        // Fetch the FULL votes collection ONCE (no real-time listener) when the user lands
        // on a screen that needs it. To see updated data, the user must hit refresh.
        // This trades real-time updates for a much cheaper read profile — critical for
        // staying within the Firebase Spark plan's 50K reads/day quota.
        let votesLoadingPromise = null;
        async function ensureFullVotesListener(forceRefresh = false) {
            const needsAllVotes = (currentScreen === 'leaderboard' || currentScreen === 'admin');
            if (needsAllVotes && (votes.length === 0 || forceRefresh) && !votesLoadingPromise) {
                votesLoadingPromise = (async () => {
                    try {
                        const snapshot = await getDocs(query(collection(db, ...getPublicDataPathSegments(), VOTES_COLLECTION_NAME)));
                        votes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        votesLoadedAt = new Date();
                    } catch (error) {
                        console.error('Failed to load votes:', error);
                        message = 'Could not load votes data. Please refresh.';
                    } finally {
                        votesLoadingPromise = null;
                        render();
                    }
                })();
            } else if (!needsAllVotes && votes.length > 0) {
                // Clear cached data when leaving so the next visit refetches
                votes = [];
                votesLoadedAt = null;
            }
        }

        window.refreshVotes = () => ensureFullVotesListener(true);
        
        function cancelAction() {
            // Close only the top-most modal. Vote confirm > admin action > edit > beer detail.
            if (pendingVote) {
                pendingVote = null;
            } else if (pendingAdminAction) {
                pendingAdminAction = null;
            } else if (editingBeerId) {
                editingBeerId = null;
            } else if (editingGroupId) {
                editingGroupId = null;
            } else if (editingBarId) {
                editingBarId = null;
            } else if (expandedBeerId) {
                expandedBeerId = null;
            }
            render();
        }

        window.openBeerDetail = (beerId) => {
            expandedBeerId = beerId;
            render();
        };

        window.closeBeerDetail = () => {
            expandedBeerId = null;
            render();
        };

        // --- Logic ---
        const calculateLeaderboard = () => {
            if (!beers.length || !votes.length) return [];
            const beerStats = {};
            votes.forEach(vote => {
                if (!beerStats[vote.beerId]) beerStats[vote.beerId] = { totalScore: 0, count: 0 };
                beerStats[vote.beerId].totalScore += vote.score;
                beerStats[vote.beerId].count += 1;
            });

            return beers.map(beer => {
                const stats = beerStats[beer.id] || { totalScore: 0, count: 0 };
                const averageScore = stats.count > 0 ? (stats.totalScore / stats.count) : 0;
                return {
                    ...beer,
                    averageScore: averageScore,
                    voteCount: stats.count,
                    displayScore: `${(Math.round(averageScore * 10) / 10).toFixed(1)}/10`,
                };
            }).sort((a, b) => b.averageScore - a.averageScore);
        };

        const getUserVotesMap = () => {
            if (!userId) return {};
            // Use myVotes (always-on, current-user-only) rather than the full votes collection,
            // which is only populated when on leaderboard/admin screens.
            return myVotes.reduce((acc, vote) => {
                acc[vote.beerId] = vote.score;
                return acc;
            }, {});
        };

        function renderTV() {
            const allActive = getActiveBeers();
            const nowPouringId = getNowPouringId();
            
            if (!userId) {
                return `<div class="flex justify-center items-center h-screen" style="background-color:#C2A858"><p class="text-2xl text-white font-bold animate-pulse drop-shadow">Loading tap list...</p></div>`;
            }

            if (allActive.length === 0) {
                return `<div class="flex justify-center items-center h-screen" style="background-color:#C2A858"><p class="text-2xl text-white/80 font-bold drop-shadow">No beers added yet.</p></div>`;
            }

            // Decide what to show based on URL params and bar state:
            //  - ?bar=X → show only beers at that bar (filtered TV)
            //  - Multi-bar with bar-assigned beers → side-by-side bar columns, each with groups
            //  - Otherwise (no bars, single bar, or bars configured but no beers assigned) →
            //    legacy single-bar layout: just groups, no bar chrome
            const barFilter = getTvBarFilter();
            const beersAreBarAssigned = anyBeerHasBar();
            // Once ANY beer has a bar, the bar layout takes over and unassigned beers
            // are hidden entirely. Admin can find them in the admin list and assign them.
            const useBarLayout = bars.length > 1 && beersAreBarAssigned;
            
            let displayBeers = allActive;
            let headerTitle = 'Tap List';
            if (barFilter) {
                displayBeers = allActive.filter(b => (b.bar || '').toLowerCase() === barFilter.toLowerCase());
                const matchedBar = getBarByName(barFilter);
                headerTitle = matchedBar ? matchedBar.name : barFilter;
                if (displayBeers.length === 0) {
                    return `<div class="flex justify-center items-center h-screen" style="background-color:#C2A858"><p class="text-2xl text-white/80 font-bold drop-shadow">No active beers at "${sanitize(headerTitle)}".</p></div>`;
                }
            } else if (useBarLayout) {
                // Combined bar view: hide beers that have no bar assignment.
                // This is the "any beer has a bar → hide unassigned entirely" rule.
                displayBeers = allActive.filter(b => b.bar && b.bar.trim());
            }

            // Buckets active beers into a Map<groupName, {color, beers: [{beer, beerNum}]}>
            // with intra-group sorting (sold-out to bottom, tap-number ascending).
            const bucketByGroup = (beerList) => {
                const map = new Map();
                beerList.forEach((beer) => {
                    const groupDoc = getGroupByName(beer.group);
                    const groupName = groupDoc ? groupDoc.name : (beer.group || 'Other');
                    const color = groupDoc ? (groupDoc.color || '#8A7438') : '#8A7438';
                    if (!map.has(groupName)) map.set(groupName, { color, beers: [] });
                    map.get(groupName).beers.push({ beer, beerNum: beer.tapNumber || '?' });
                });
                map.forEach((bucket) => {
                    bucket.beers.sort((a, b) => {
                        const aSold = !!a.beer.soldOut;
                        const bSold = !!b.beer.soldOut;
                        if (aSold !== bSold) return aSold ? 1 : -1;
                        const na = parseInt(a.beerNum) || 9999;
                        const nb = parseInt(b.beerNum) || 9999;
                        return na - nb;
                    });
                });
                return map;
            };

            const renderBeerCard = ({ beer, beerNum }) => {
                const soldOut = !!beer.soldOut;
                const hasAllergens = beer.allergens && beer.allergens.trim();
                const isNowPouring = beer.id === nowPouringId;
                // Sold-out beers don't show a tap number — the tap they were on is either
                // empty or has a different beer on it now. Keep the badge slot the same size
                // for layout consistency, but render it as a neutral empty circle.
                const badgeContent = soldOut ? '—' : beerNum;
                const badgeBg = soldOut ? '#9ca3af' : (isNowPouring ? '#2563eb' : '#1e293b');
                return `
                    <div class="flex items-center gap-2.5 py-1.5 border-b border-dashed ${soldOut ? 'opacity-40' : ''} ${isNowPouring ? 'relative' : ''}" style="border-color: rgba(194, 168, 88, 0.35);${isNowPouring ? 'background: linear-gradient(90deg, rgba(37, 99, 235, 0.08) 0%, transparent 100%);' : ''}">
                        <div class="flex-shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-full font-black text-base shadow-md" style="background-color: ${badgeBg}; color: #FAF6EC;">${badgeContent}</div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-center gap-1.5">
                                <div class="font-extrabold text-gray-900 text-base leading-tight truncate">${sanitize(beer.name)}</div>
                                ${isNowPouring ? `<span class="flex-shrink-0 text-[9px] font-black text-white bg-blue-600 px-1.5 py-0.5 rounded uppercase tracking-wider">Now Pouring</span>` : ''}
                            </div>
                            <div class="text-xs truncate font-semibold" style="color: #8A7438;">${sanitize(beer.brewer)} <span class="text-gray-500 font-medium">· ${sanitize(beer.style)}</span></div>
                            ${(beer.vegan || hasAllergens) ? `
                                <div class="flex items-center gap-1.5 mt-0.5">
                                    ${beer.vegan ? `<span class="inline-flex items-center gap-1 text-[10px] font-bold text-green-800 bg-green-100 px-1.5 py-0.5 rounded"><i data-lucide="leaf" class="w-2.5 h-2.5"></i>VEGAN</span>` : ''}
                                    ${hasAllergens ? `<span class="inline-flex items-center gap-1 text-[10px] font-bold text-amber-800 bg-amber-100 px-1.5 py-0.5 rounded"><i data-lucide="alert-triangle" class="w-2.5 h-2.5"></i>${sanitize(beer.allergens).toUpperCase()}</span>` : ''}
                                </div>
                            ` : ''}
                        </div>
                        <div class="flex-shrink-0 text-right">
                            ${soldOut
                                ? `<div class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-black uppercase tracking-wider" style="background-color: #1e293b; color: #FAF6EC;">Sold Out</div>`
                                : `<div class="text-xl font-black leading-none" style="color: #8A7438;">${sanitize(beer.abv)}<span class="text-sm">%</span></div>
                                   <div class="text-gray-400 text-[9px] font-semibold uppercase tracking-wide">ABV</div>`
                            }
                        </div>
                    </div>`;
            };

            // Renders one bar's worth of content (group sections) inside a column.
            // Used both as the WHOLE TV (single-bar / filtered) and as a column in combined view.
            const renderBarColumn = (barName, beersForBar) => {
                const beerGroups = bucketByGroup(beersForBar);
                let sectionsHtml = '';
                beerGroups.forEach(({ color, beers: groupBeers }, groupName) => {
                    sectionsHtml += `
                        <section class="flex-grow flex flex-col min-h-0">
                            <div class="flex items-center gap-3 mb-1 flex-shrink-0">
                                <div class="flex-shrink-0 w-2 h-7 rounded-sm" style="background-color: ${sanitize(color)};"></div>
                                <h2 class="text-xl font-black uppercase tracking-widest" style="color: ${sanitize(color)};">${sanitize(groupName)}</h2>
                                <div class="flex-grow h-px" style="background-color: ${sanitize(color)}; opacity: 0.3;"></div>
                                <span class="text-xs font-semibold text-gray-400">${groupBeers.length} beer${groupBeers.length === 1 ? '' : 's'}</span>
                            </div>
                            <div class="flex-grow grid grid-cols-${useBarLayout && !barFilter ? '2' : '3'} gap-x-6 min-h-0 overflow-hidden" style="grid-auto-rows: minmax(0, 1fr);">
                                ${groupBeers.map(renderBeerCard).join('')}
                            </div>
                        </section>`;
                });
                return sectionsHtml;
            };

            let html = `
                <div class="h-screen p-5 flex flex-col overflow-hidden" style="background-color:#C2A858">
                    <header class="text-center mb-3 flex-shrink-0">
                        <h1 class="text-6xl font-extrabold text-white tracking-tight drop-shadow-lg leading-none">${sanitize(headerTitle)}</h1>
                    </header>

                    <div class="flex-grow rounded-2xl shadow-2xl p-5 min-h-0 flex ${useBarLayout && !barFilter ? 'flex-row gap-6' : 'flex-col gap-3'} overflow-hidden" style="background-color: #FAF6EC; border: 1px solid rgba(194, 168, 88, 0.4);">`;
            
            if (useBarLayout && !barFilter) {
                // Combined view: each bar is a vertical column with its own dark header,
                // then its own group sections beneath. Bar columns sit side-by-side.
                // Beers with no bar are filtered out upstream (in displayBeers), so the
                // "Other" column doesn't appear here.
                getSortedBars().forEach((bar) => {
                    const beersForBar = displayBeers.filter(b => (b.bar || '') === bar.name);
                    if (beersForBar.length === 0) return; // Skip bars with no active beers
                    html += `
                        <div class="flex-1 flex flex-col min-h-0 min-w-0 gap-3">
                            <div class="flex-shrink-0 text-center py-2 rounded-lg" style="background-color: #1e293b; color: #FAF6EC;">
                                <div class="text-lg font-black uppercase tracking-widest">${sanitize(bar.name)}</div>
                            </div>
                            ${renderBarColumn(bar.name, beersForBar)}
                        </div>`;
                });
            } else {
                // Single-bar mode, no bars configured, no beers assigned yet, or filtered
                // to one bar: just the group sections, no bar chrome.
                html += renderBarColumn(barFilter, displayBeers);
            }

            html += `
                    </div>

                    <footer class="flex items-center justify-center gap-4 mt-3 text-white/90 text-sm flex-shrink-0 drop-shadow font-semibold">
                        <img src="NAB_logo.png" alt="NAB Logo" class="h-7 flex-shrink-0"/>
                        <span>Don't forget to vote for your favourites &nbsp;·&nbsp; <span class="font-mono">https://nab-vote.web.app</span></span>
                        <img src="NAB_logo.png" alt="NAB Logo" class="h-7 flex-shrink-0"/>

        function renderContent() {
            if (!userId) return '<div class="flex justify-center items-center h-48"><p class="text-xl text-white drop-shadow font-bold">Connecting to brewery...</p></div>';
            switch (currentScreen) {
                case 'admin': return renderAdmin();
                case 'leaderboard': return renderLeaderboard();
                case 'voting': default: return renderVoting();
            }
        }

        function renderStarRating(score, maxStars = 10, hasVoted = false, currentVote = null, beerId = null) {
            let html = '<div class="flex justify-center flex-wrap space-x-1">';
            const isDisplayOnly = hasVoted || !beerId;

            for (let i = 1; i <= maxStars; i++) {
                let isFilled = false;
                let colorClass = 'text-stone-800 opacity-30';
                let sizeClass = 'w-4 h-4 sm:w-5 sm:h-5'; 
                let cursorClass = 'cursor-pointer hover:scale-125 transition-transform';
                
                if (isDisplayOnly) {
                    isFilled = i <= Math.round(score);
                    colorClass = (hasVoted && isFilled) ? 'text-yellow-300 drop-shadow-md' : (isFilled ? 'text-white drop-shadow-md' : 'text-stone-800 opacity-20');
                    cursorClass = 'cursor-default';
                } else if (currentVote !== null) {
                    isFilled = i <= currentVote;
                    colorClass = isFilled ? 'text-green-200 drop-shadow-md' : 'text-stone-800 opacity-20';
                    cursorClass = 'cursor-not-allowed';
                } else {
                    isFilled = i <= score;
                    colorClass = isFilled ? 'text-white drop-shadow-md' : 'text-stone-800 opacity-30';
                }

                html += `
                    <button ${isDisplayOnly || currentVote !== null ? 'disabled' : ''} onclick="handleVote('${beerId}', ${i})" class="${cursorClass} p-0.5 focus:outline-none">
                        <svg class="${sizeClass} ${colorClass}" fill="${isFilled ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="${isFilled ? '0' : '2'}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                    </button>`;
            }
            html += '</div>';
            return html;
        }

        function renderVoting() {
            const userVotesMap = getUserVotesMap();
            const leaderboard = calculateLeaderboard();
            const sortedBeers = getActiveBeers();
            const nowPouringId = getNowPouringId();
            
            const votingBeers = sortedBeers.map(beer => {
                const stats = leaderboard.find(l => l.id === beer.id) || { averageScore: 0, voteCount: 0, displayScore: '0.0/10' };
                return { ...beer, stats };
            });

            let html = '<div class="max-w-xs sm:max-w-4xl mx-auto space-y-8 pb-12">';

            if (!votingOpen) {
                html += `
                    <div class="text-center p-8 bg-white/90 rounded-xl shadow-lg border-2 border-red-200">
                        <div class="text-5xl mb-4">🍻</div>
                        <h2 class="text-2xl font-extrabold text-gray-800 mb-2">Voting is Closed</h2>
                        <p class="text-gray-600">Thanks for participating! Check the leaderboard for results.</p>
                    </div>`;
                html += '</div>';
                return html;
            }
            
            if (votingBeers.length === 0) {
                html += `<div class="text-center p-8 bg-white/90 rounded-xl shadow-lg"><p class="text-xl text-gray-600">No beers added yet.</p></div>`;
            } else {
                html += `
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                        <div class="px-4 py-3 bg-slate-700 text-white">
                            <h2 class="font-bold text-base sm:text-lg flex items-center">
                                <i data-lucide="list" class="w-5 h-5 mr-2"></i>
                                Festival Programme
                            </h2>
                            <p class="text-xs text-slate-300 mt-0.5">Tap any beer for details and to vote</p>
                        </div>
                        <div>`;
                
                // Render groups within a bar (or for the whole list in single-bar mode).
                // Extracted so it can be called once-per-bar in multi-bar mode without duplication.
                const renderGroupedBeers = (beerList) => {
                    let inner = '';
                    const grouped = new Map();
                    beerList.forEach((beer) => {
                        const g = beer.group || 'Other';
                        if (!grouped.has(g)) grouped.set(g, []);
                        grouped.get(g).push({ beer, beerNum: beer.tapNumber || '?' });
                    });
                    grouped.forEach((arr) => {
                        arr.sort((a, b) => {
                            const na = parseInt(a.beerNum) || 9999;
                            const nb = parseInt(b.beerNum) || 9999;
                            return na - nb;
                        });
                    });
                    grouped.forEach((bList, groupName) => {
                        const groupDoc = getGroupByName(groupName);
                        const headerColor = groupDoc && groupDoc.color ? groupDoc.color : '#475569';
                        if (grouped.size > 1) {
                            inner += `<div class="px-3 sm:px-4 pt-3 pb-1.5 bg-slate-50 border-b border-gray-100 flex items-center gap-2">
                                <div class="flex-shrink-0 w-1.5 h-4 rounded-sm" style="background-color: ${sanitize(headerColor)};"></div>
                                <h3 class="text-xs font-black uppercase tracking-widest" style="color: ${sanitize(headerColor)};">${sanitize(groupName)}</h3>
                            </div>`;
                        }
                        inner += '<ul class="divide-y divide-gray-100">';
                        bList.forEach(({ beer, beerNum }) => {
                            const hasVoted = !!userVotesMap[beer.id];
                            const soldOut = !!beer.soldOut;
                            const hasAllergens = beer.allergens && beer.allergens.trim();
                            const isNowPouring = beer.id === nowPouringId;
                            inner += `
                                    <li>
                                        <button onclick="openBeerDetail('${beer.id}')" class="w-full flex items-center px-3 sm:px-4 py-3 hover:bg-slate-50 active:bg-slate-100 transition text-left ${soldOut ? 'opacity-60' : ''}">
                                            <span class="flex-shrink-0 inline-flex items-center justify-center w-9 h-9 rounded-full ${soldOut ? 'bg-gray-400' : 'bg-slate-700'} text-white font-black text-sm shadow-sm mr-2 sm:mr-3">${beerNum}</span>
                                            <div class="flex-grow min-w-0 mr-2">
                                                <div class="flex items-center gap-1.5 flex-wrap">
                                                    <span class="font-bold text-gray-800 text-sm leading-tight break-words">${sanitize(beer.name)}</span>
                                                    ${isNowPouring ? `<span class="text-[9px] font-black text-white bg-blue-600 px-1.5 py-0.5 rounded uppercase tracking-wider">New</span>` : ''}
                                                    ${beer.vegan ? `<i data-lucide="leaf" class="w-3 h-3 text-green-600 flex-shrink-0" title="Vegan-friendly"></i>` : ''}
                                                    ${hasAllergens ? `<i data-lucide="alert-triangle" class="w-3 h-3 text-amber-600 flex-shrink-0" title="Contains: ${sanitize(beer.allergens)}"></i>` : ''}
                                                </div>
                                                <div class="text-xs text-gray-500 break-words mt-0.5">${sanitize(beer.style)}</div>
                                            </div>
                                            <div class="flex-shrink-0 flex items-center gap-1.5">
                                                ${soldOut 
                                                    ? `<span class="text-[9px] sm:text-[10px] font-bold text-red-700 bg-red-100 px-1.5 py-0.5 rounded-full uppercase tracking-wide">Sold Out</span>` 
                                                    : (hasVoted ? `<span class="text-[9px] sm:text-[10px] font-bold text-green-700 bg-green-100 px-1.5 py-0.5 rounded-full uppercase tracking-wide">Voted</span>` : '')
                                                }
                                                <div class="text-right leading-none">
                                                    <div class="text-xs sm:text-sm font-bold text-gray-700">${sanitize(beer.abv)}%</div>
                                                    <div class="text-[9px] text-gray-400 uppercase tracking-wide">ABV</div>
                                                </div>
                                                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
                                            </div>
                                        </button>
                                    </li>`;
                        });
                        inner += '</ul>';
                    });
                    return inner;
                };

                // Bar layout only kicks in when there are multiple bars AND at least one
                // beer is bar-assigned. Once that triggers, unassigned beers are hidden
                // entirely — admin can spot them in the admin list and assign them.
                // Single-bar mode (or no beers assigned yet) → flat groups, no bar chrome.
                const useBarLayoutVoting = bars.length > 1 && anyBeerHasBar();
                if (useBarLayoutVoting) {
                    const barAssignedBeers = votingBeers.filter(b => b.bar && b.bar.trim());
                    getSortedBars().forEach((bar) => {
                        const beersForBar = barAssignedBeers.filter(b => b.bar === bar.name);
                        if (beersForBar.length === 0) return;
                        html += `<div class="bg-slate-700 text-white px-3 sm:px-4 py-2.5 flex items-center gap-2 sticky top-0 z-10">
                            <i data-lucide="beer" class="w-4 h-4 flex-shrink-0"></i>
                            <span class="text-sm font-black uppercase tracking-widest">${sanitize(bar.name)}</span>
                            <span class="ml-auto text-[10px] font-semibold text-slate-300">${beersForBar.length} beer${beersForBar.length === 1 ? '' : 's'}</span>
                        </div>`;
                        html += renderGroupedBeers(beersForBar);
                    });
                } else {
                    html += renderGroupedBeers(votingBeers);
                }
                
                html += `</div>
                    </div>`;
            }
            html += '</div>';
            return html;
        }

        function renderLeaderboard() {
            // Gate: only show if public or user is admin
            if (!leaderboardPublic && !isAdmin) {
                currentScreen = 'voting';
                return renderVoting();
            }

            const isLoading = votesLoadingPromise !== null;
            const lastUpdatedStr = votesLoadedAt 
                ? votesLoadedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                : '—';

            const allBeers = calculateLeaderboard();
            const leaderboard = allBeers.filter(beer => beer.voteCount > 0).slice(0, 5);

            let html = '<div class="max-w-3xl mx-auto space-y-6 pb-12">';
            html += '<h2 class="text-3xl font-extrabold text-white text-center drop-shadow">Top 5 Leaderboard</h2>';

            // Last-updated panel + refresh button — sets the expectation that this is a snapshot
            html += `
                <div class="flex items-center justify-between bg-white/90 rounded-lg px-4 py-2 shadow text-sm">
                    <div class="text-gray-600">
                        <span class="font-semibold">Last updated:</span> 
                        <span class="${isLoading ? 'animate-pulse' : ''}">${isLoading ? 'Loading...' : lastUpdatedStr}</span>
                    </div>
                    <button onclick="refreshVotes()" ${isLoading ? 'disabled' : ''} class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-slate-700 text-white text-xs font-bold hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition">
                        <i data-lucide="refresh-cw" class="w-3.5 h-3.5 ${isLoading ? 'animate-spin' : ''}"></i>
                        Refresh
                    </button>
                </div>`;

            if (isLoading && leaderboard.length === 0) {
                html += `<div class="text-center p-8 bg-white/90 rounded-xl shadow-lg"><p class="text-xl text-gray-600 animate-pulse">Loading results...</p></div>`;
            } else if (leaderboard.length === 0) {
                html += `<div class="text-center p-8 bg-white/90 rounded-xl shadow-lg"><p class="text-xl text-gray-600">No ranked beers yet.</p></div>`;
            } else {
                html += '<div class="space-y-4">';
                leaderboard.forEach((beer, index) => {
                    let rankClass = 'bg-white border-gray-100 text-gray-500';
                    if (index === 0) rankClass = 'bg-yellow-50 border-yellow-400 text-yellow-600 ring-2 ring-yellow-400';
                    if (index === 1) rankClass = 'bg-gray-50 border-gray-400 text-gray-600 ring-1 ring-gray-300';
                    if (index === 2) rankClass = 'bg-orange-50 border-orange-400 text-orange-700 ring-1 ring-orange-300';

                    html += `
                        <div class="p-4 rounded-xl shadow-lg flex items-center border ${rankClass}">
                            <div class="text-4xl font-black mr-4 w-12 text-center opacity-80">#${index + 1}</div>
                            <div class="flex-grow min-w-0 mr-4">
                                <h3 class="text-xl font-bold text-gray-800 break-words">${sanitize(beer.name)}</h3>
                                <p class="text-sm opacity-80">${sanitize(beer.brewer)} &middot; ${sanitize(beer.style)}</p>
                            </div>
                            <div class="text-right flex-shrink-0 w-24 sm:w-28">
                                <div class="text-2xl font-bold">${beer.displayScore}</div>
                                <div class="text-xs opacity-70">${beer.voteCount} votes</div>
                            </div>
                        </div>`;
                });
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

            if (userId && !isAnon) {

            return `
                <div class="p-6 max-w-sm mx-auto bg-white rounded-xl shadow-lg space-y-4">

                    <form id="adminLoginForm" class="space-y-4">
                        <input type="email" id="adminEmail" placeholder="Email" class="w-full px-3 py-2 border rounded" required />
                        <input type="password" id="adminPassword" placeholder="Password" class="w-full px-3 py-2 border rounded" required />
                        <button type="submit" class="w-full bg-amber-600 text-white font-bold py-2 rounded">Sign In</button>

        // --- FIREBASE ACTIONS & LISTENERS ---
        
        async function authenticateUser() {
            if (window.firebaseConfigError) return;
            try { 
                await setPersistence(auth, browserLocalPersistence);
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        isAnon = user.isAnonymous;
                        if (!isAnon) {
                            const adminRef = doc(db, ...getPublicDataPathSegments(), ADMINS_COLLECTION_NAME, user.uid);
                            onSnapshot(adminRef, (docSnap) => { isAdmin = docSnap.exists(); render(); });
                        }

                        const beersQuery = query(collection(db, ...getPublicDataPathSegments(), BEERS_COLLECTION_NAME));
                        onSnapshot(beersQuery, (snapshot) => {
                            beers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            render();
                        });

                        // Groups: small admin-managed collection (typically 4-6 docs).
                        // Cheap to subscribe to from every device; total reads negligible.
                        const groupsQuery = query(collection(db, ...getPublicDataPathSegments(), GROUPS_COLLECTION_NAME));
                        onSnapshot(groupsQuery, (snapshot) => {
                            groups = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            render();
                        });

                        // Bars: tiny admin-managed collection (0-3 docs typically).
                        // If empty, the app runs in single-bar mode with no bar chrome anywhere.
                        const barsQuery = query(collection(db, ...getPublicDataPathSegments(), BARS_COLLECTION_NAME));
                        onSnapshot(barsQuery, (snapshot) => {
                            bars = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            render();
                        });

                        // Only subscribe to the CURRENT USER's votes by default.
                        // The full votes collection is only fetched on-demand when the user
                        // navigates to the leaderboard or admin screen — see ensureFullVotesListener().
                        const myVotesQuery = query(
                            collection(db, ...getPublicDataPathSegments(), VOTES_COLLECTION_NAME),
                            where('userId', '==', user.uid)
                        );
                        onSnapshot(myVotesQuery, (snapshot) => {
                            myVotes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            render();
                        });

                        // Settings listener (voting open/closed, leaderboard visibility)
                        const settingsRef = doc(db, ...getPublicDataPathSegments(), SETTINGS_COLLECTION_NAME, SETTINGS_DOC_ID);
                        onSnapshot(settingsRef, (docSnap) => {
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                votingOpen = data.votingOpen !== false;
                                leaderboardPublic = data.leaderboardPublic === true;
                            } else {
                                votingOpen = true;
                                leaderboardPublic = false;
                            }
                            render();
                        });

                        // If the page loaded directly into a screen that needs full votes
                        // (e.g. ?screen=admin), attach the full listener now.
                        ensureFullVotesListener();
                    } else {
                        if (auth && auth.currentUser === null) {
                            await signInAnonymously(auth);
                        } else {
                            userId = null; isAnon = true; isAdmin = false; render();
                        }
                    }
                });
            } catch (error) {
                console.error("Authentication Error:", error);
                message = 'Authentication failed. Please check your network or Firebase configuration.';
                render();
            }
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            const email = e.target.adminEmail.value;
            const password = e.target.adminPassword.value;
            message = 'Signing in...'; render();
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, password);
                message = 'Admin sign-in successful. Checking whitelist...';
            } catch (error) {
                message = `Login failed: ${error.message}`;
            } finally { render(); }
        }

        function handleSignOut() {
            signOut(auth).then(() => {
                message = 'Signed out. Redirecting to voting screen.';
                changeScreen('voting');
            }).catch((error) => {
                message = `Sign out failed: ${error.message}`;
                render();

        window.handleVote = (beerId, score) => {
            const beer = getBeerById(beerId);
            if (!beer) { message = 'Error: Beer not found.'; render(); return; }
            pendingVote = { beerId, score, beerName: beer.name };
            render();
        };

        window.confirmVote = async () => {
            if (!pendingVote || !userId) return;
            if (!votingOpen) { message = 'Voting is currently closed.'; pendingVote = null; render(); return; }
            const { beerId, score } = pendingVote;
            pendingVote = null;
            try {
                const userVote = myVotes.find(v => v.beerId === beerId);
                if (userVote) {
                    const voteRef = doc(db, ...getPublicDataPathSegments(), VOTES_COLLECTION_NAME, userVote.id);
                    await updateDoc(voteRef, { score: score, updated: serverTimestamp() });
                    message = `Your vote for ${getBeerById(beerId).name} was updated to ${score}/10!`;
                } else {
                    await addDoc(collection(db, ...getPublicDataPathSegments(), VOTES_COLLECTION_NAME), { beerId, userId, score, created: serverTimestamp() });
                    message = `Vote recorded for ${getBeerById(beerId).name} (${score}/10)!`;

                message = `Vote failed: ${error.message}`;
                console.error("Error submitting vote: ", error);

        // --- ADMIN FUNCTIONS ---

        window.toggleVoting = async () => {
            if (!isAdmin) return;
            const newState = !votingOpen;
            message = newState ? 'Opening voting...' : 'Closing voting...'; render();
            try {
                const settingsRef = doc(db, ...getPublicDataPathSegments(), SETTINGS_COLLECTION_NAME, SETTINGS_DOC_ID);
                await setDoc(settingsRef, { votingOpen: newState, updated: serverTimestamp() }, { merge: true });
                message = newState ? 'Voting is now OPEN!' : 'Voting is now CLOSED.';
